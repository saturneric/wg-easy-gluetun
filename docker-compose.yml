services:
  # Runs once on every `docker compose up` to generate all config files from
  # config.yaml + templates/.  All other services wait for it to finish.
  config-gen:
    build:
      context: .
      dockerfile: ./Dockerfile.config-gen
    volumes:
      - .:/workspace
    network_mode: none
    restart: "no"

  wg-easy:
    build:
      context: .
      dockerfile: ./Dockerfile
    depends_on:
      config-gen:
        condition: service_completed_successfully
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    networks:
      vpn:
        ipv4_address: 172.31.0.8 # Fixed IPv4 address
        ipv6_address: "fd01:beee:beee::8" # Fixed IPv6 address
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1
    env_file:
      - ./runtime/.env
    volumes:
      - /lib/modules:/lib/modules:ro
      - ./runtime/data/wg-easy:/etc/wireguard # Persist WireGuard configuration
    restart: unless-stopped

  gluetun:
    image: qmcgaw/gluetun:latest
    depends_on:
      config-gen:
        condition: service_completed_successfully
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./runtime/.env
    volumes:
      - /lib/modules:/lib/modules:ro
      - ./runtime/data/gluetun:/gluetun # Persist gluetun configuration
      - ./runtime/conf/iptables/post-rules.txt:/iptables/post-rules.txt:ro
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1
    networks:
      vpn:
        ipv4_address: 172.31.0.4 # Fixed IPv4 address
        ipv6_address: "fd01:beee:beee::4" # Fixed IPv6 address
    restart: unless-stopped

  # AdGuard Home service as DNS server
  # If you do not want to use Adguard Home, you can comment out or remove this service.
  adguardhome:
    image: adguard/adguardhome
    depends_on:
      config-gen:
        condition: service_completed_successfully
    volumes:
      - ./runtime/data/adguardhome/work:/opt/adguardhome/work
      - ./runtime/conf/adguardhome:/opt/adguardhome/conf
    networks:
      vpn:
        ipv4_address: 172.31.0.16 # Fixed IPv4 address
        ipv6_address: "fd01:beee:beee::10" # Fixed IPv6 address
    restart: unless-stopped

  sing-box:
    build:
      context: .
      dockerfile: ./Dockerfile.sing-box
    depends_on:
      config-gen:
        condition: service_completed_successfully
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/etc/sing-box/entrypoint.sh"]
    volumes:
      - ./runtime/conf/sing-box:/etc/sing-box
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "9090:9090"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.conf.all.rp_filter=0
      - net.ipv4.conf.default.rp_filter=0
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1
    networks:
      vpn:
        ipv4_address: 172.31.0.32 # Fixed IPv4 address
        ipv6_address: "fd01:beee:beee::20" # Fixed IPv6 address

networks:
  vpn: # separate bridge network with IPv4 and IPv6
    name: vpn
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.31.0.0/16 # IPv4 subnet
          gateway: 172.31.0.1 # IPv4 gateway
        - subnet: fd01:beee:beee::/48 # IPv6 subnet
          gateway: fd01:beee:beee::1 # IPv6 gateway
